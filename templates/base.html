<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Amazon Affiliate Auto-Publisher{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-dark bg-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                🤖 Amazon Affiliate Auto-Publisher
            </a>
            <div class="d-flex gap-2">
                <a href="/" class="btn btn-outline-light btn-sm">Dashboard</a>
                <a href="/articles" class="btn btn-outline-light btn-sm">Articles</a>
            </div>
        </div>
    </nav>

    <main class="container-fluid py-4" style="max-width: 1200px;">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-dark text-light text-center py-3 mt-5">
        <p class="mb-0">© 2024 Amazon Affiliate Auto-Publisher | Powered by Claude API</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
